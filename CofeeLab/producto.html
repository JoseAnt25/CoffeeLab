<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café & Co. — Producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
  <link rel="stylesheet" href="estilosProducto.css">
</head>
<body>

  <div class="toast" id="toast"></div>

  <div class="side-menu-overlay" id="sideMenuOverlay" onclick="closeSideMenu()"></div>
  <div class="side-menu" id="sideMenu">
    <button class="side-menu-close" onclick="closeSideMenu()">✕</button>
    <nav>
      <a href="catalogo.html?cat=Café en grano">Café en grano</a>
      <a href="catalogo.html?cat=Cafeteras">Cafeteras</a>
      <a href="catalogo.html?cat=Utilidades">Utilidades</a>
    </nav>
  </div>

  <nav class="barra-nav">
    <div class="hamburguesa" onclick="openSideMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="marca" onclick="window.location.href='index.html'">Café & Co.</div>
    <div class="barra-busqueda">
      <input type="text" placeholder="Buscar">
      <span class="icono-busqueda">🔍</span>
    </div>
    <div class="nav-derecha">
      <button class="btn-nav" onclick="window.location.href='login.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <button class="btn-nav" onclick="window.location.href='carrito.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="20" r="1"/>
          <circle cx="20" cy="20" r="1"/>
          <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
        </svg>
        <span class="insignia-carrito">0</span>
      </button>
    </div>
  </nav>

  <div class="product-detail">
    <div class="product-img-box" id="detail-img">🫘</div>
    <div class="product-info">
      <h1 id="detail-name">NOMBRE DEL PRODUCTO</h1>
      <p class="desc" id="detail-desc">Descripción del producto</p>
      <p class="price" id="detail-price">0,00€</p>
      <div class="qty-cart">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qty-display">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-add-cart" onclick="handleAddToCart()">AÑADIR AL CARRITO</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="producto.js"></script>
</body>
</html>
