<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeLab — Crear cuenta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="estilosLogin.css">
</head>

<body>

    <div class="notificacion" id="notificacion"></div>

    <nav class="barra-nav-login">
        <div style="width:36px"></div>
        <div class="marca" onclick="window.location.href='index.html'">CoffeeLab</div>
        <div style="width:36px"></div>
    </nav>

    <div class="contenedor-auth">
        <div class="tarjeta-auth">
            <h2 class="titulo-auth">Crear cuenta</h2>
            <div class="campo-auth">
                <label>Nombre</label>
                <input type="text" placeholder="Tu nombre" id="nombre-registro">
            </div>
            <div class="campo-auth">
                <label>Correo electrónico</label>
                <input type="email" placeholder="prueba@none.com" id="email-registro">
            </div>
            <div class="campo-auth">
                <label>Contraseña</label>
                <div class="envoltorio-pass">
                    <input type="password" placeholder="************" id="pass-registro">
                    <button class="btn-ojo" onclick="alternarPass('pass-registro')">👁</button>
                </div>
            </div>
            <div class="campo-auth">
                <label>Teléfono</label>
                <input type="tel" placeholder="+34 600 000 000" id="telefono-registro">
            </div>
            <div class="campo-auth">
                <label>Dirección</label>
                <input type="text" placeholder="Calle Mayor, 12, 3º A" id="direccion-registro">
            </div>
            <div class="campos-dobles">
                <div class="campo-auth">
                    <label>Ciudad</label>
                    <input type="text" placeholder="Madrid" id="ciudad-registro">
                </div>
                <div class="campo-auth">
                    <label>Código postal</label>
                    <input type="text" placeholder="28001" id="cp-registro">
                </div>
            </div>
            <div class="campo-auth">
                <label>País</label>
                <input type="text" placeholder="España" id="pais-registro">
            </div>
            <button class="btn-auth btn-acceder" onclick="manejarRegistro()">Crear cuenta</button>
            <div class="separador-auth">
                <span>¿Ya tienes cuenta?</span>
            </div>
            <button class="btn-auth btn-cuenta-nueva" onclick="window.location.href='login.html'">Iniciar
                sesión</button>
        </div>
    </div>

    <script src="scriptLogin.js"></script>
</body>

</html>
