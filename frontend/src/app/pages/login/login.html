<section class="login">
  <div class="login-card">
    <h1>Iniciar sesión</h1>
    <p>Bienvenido de nuevo a CoffeLab ☕</p>

    <div class="form-group">
      <label for="correo">Correo electrónico</label>
      <input
        id="correo"
        type="email"
        [ngModel]="correo()"
        (ngModelChange)="correo.set($event)"
        placeholder="tu@correo.com"
      />
    </div>

    <div class="form-group">
      <label for="contrasena">Contraseña</label>
      <input
        id="contrasena"
        type="password"
        [ngModel]="contrasena()"
        (ngModelChange)="contrasena.set($event)"
        placeholder="••••••••"
      />
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button
      class="btn-primary"
      (click)="iniciarSesion()"
      [disabled]="cargando()">
      @if (cargando()) {
        Iniciando sesión...
      } @else {
        Iniciar sesión
      }
    </button>

    <p class="registro-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</section>
